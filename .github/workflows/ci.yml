name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    # Core-only: lint + run the suite with no heavy extras installed. Proves the
    # package imports and the core paths work without torch/zarr (heavy-dep tests
    # self-skip), so an end user who installs just the core isn't broken. Run across
    # every supported Python (matches the requires-python / classifiers contract).
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core only)
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Test (core)
        run: uv run pytest -m "not slow" -q

  test-full:
    # Full stack: torch/zarr/image/models present, so the embed + model +
    # runner code paths actually execute in CI instead of being skipped. CPU torch
    # wheels (UV_TORCH_BACKEND=cpu) keep the install lean - no multi-GB CUDA download.
    runs-on: ubuntu-latest
    env:
      UV_TORCH_BACKEND: cpu
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install (full stack, CPU torch)
        run: uv sync --extra zarr --extra image --extra torch --extra models --extra stain
      - name: Test (with torch)
        run: uv run pytest -m "not slow" -q
