  license: "CC-BY-NC-ND-4.0 (H0-mini, Bioptimus/Owkin; non-commercial academic research)"
  gated: true
  inference_amp: fp16      # card uses torch.autocast(dtype=torch.float16)
  # Effective model_args copied from the pinned config so the output fingerprint
