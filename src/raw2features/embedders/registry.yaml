# Feature-extractor registry. Every entry is provenance-complete: the
# preprocessing (mean/std/input_size) and create_model call are transcribed from
# the model's authoritative card/repo (transform_source_url).
#
# Pitfall (learned from mSTAR): a model's timm `pretrained_cfg` mean/std can be an
# un-overridden base-arch default (e.g. vit_large/small_patch16_224 default to
# [0.5, 0.5, 0.5]), not the authors' real transform. Source mean/std from the authors'
# usage code/paper, not from the config field. `transform_source: pretrained_cfg` adopts
# and asserts the config value, which catches registry-vs-config drift but cannot tell you
# the config itself is a wrong default (mSTAR's config said [0.5]; its README used ImageNet).
#
# Note: raw2features delivers exact-MPP patches at `input_size`, so embedders
# normalise only (no eval-time resize/crop). mean/std below are what we apply.
#
# inference_amp (optional, default "fp32"): the precision the model's card uses
# for inference. `--amp auto` (the default) resolves to it per model. Most models
# below run fp32 in their card example; a few set `inference_amp: fp16` where the
# card recommends it (Virchow2, H-optimus-0), sourced like mean/std.
#
# recommended_mpp (optional): the DEFAULT extraction scale, microns/px (0.5 == 20x). This
# is a convention, not a card-mandated value - most cards state no MPP, so 0.5 is inferred
# from each paper (the pathology-FM norm); a few are card/code-stated (see per-model notes,
# e.g. retccl=1.0). The best scale is task-dependent. input_size is the patch size in px,
# so the field of view is input_size * recommended_mpp microns. It drives the default
# --mpp: when the user omits --mpp, the pipeline extracts at the requested models'
# recommended_mpp (a single shared value; it errors if they disagree). An explicit --mpp
# always wins (and prints an informational note if it differs). The ImageNet baselines
# (resnet50, dinov2) are scale-agnostic (no recommended_mpp → default 1.0). See docs/MODELS.md.

resnet50:
  family: torchvision
  source: "torchvision://resnet50?weights=IMAGENET1K_V2"
  weights_filename: "ResNet50_Weights.IMAGENET1K_V2"
  embedding_dim: 2048
  input_size: 224
  pooling: pooled
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  interpolation: bilinear
  transform_source_url: "https://pytorch.org/vision/stable/models/generated/torchvision.models.resnet50.html"
  weights_revision: "IMAGENET1K_V2"
  doi: "10.1109/CVPR.2016.90"
  license: "BSD-3-Clause (torchvision)"
  gated: false
  notes: "ImageNet floor baseline; fc removed, global-avg-pool -> 2048-d."

