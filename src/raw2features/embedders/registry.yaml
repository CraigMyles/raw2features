  notes: "DINOv2 ViT-L/16, 1024-d. arch from config (vit_large_patch16_224); needs
    init_values + dynamic_img_size or the state_dict won't load."

virchow2:
  family: timm
  source: "hf-hub:paige-ai/Virchow2"
  recommended_mpp: 0.5   # card states FOUR scales 2.0/1.0/0.5/0.25 µm/px (5x/10x/20x/40x); 0.5 is a convention default
  embedding_dim: 2560        # concat(class_token[1280], mean patch_tokens[1280])
  input_size: 224
  pooling: cls_concat_meanpatch
  reg_tokens: 4              # tokens 1-4 are register tokens, skipped (per card)
  # mean/std/interpolation are resolved from the model's pretrained_cfg at load
  # (the card builds its transform via resolve_data_config(model.pretrained_cfg)).
  # The values below are the card-documented fallback used offline (no weights);
  # the embedder asserts they match the loaded pretrained_cfg.
  transform_source: pretrained_cfg
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  interpolation: bicubic
  transform_source_url: "https://huggingface.co/paige-ai/Virchow2"
  weights_sha256: "8d6cea947eb2418c3b0dff48cfb9b238e47744ab0dfca21b2b0637b140769b4b"
  weights_filename: "model.safetensors"
  weights_revision: "3158645804b69e3f3bc4439d4116edddf0840a72"
  doi: "10.48550/arXiv.2408.00738"
  license: "CC-BY-NC-ND-4.0 (Virchow2, non-commercial)"
  gated: true
  inference_amp: fp16        # card "highly recommends" fp16 via torch.autocast
  timm_kwargs:
    mlp_layer: "timm.layers.SwiGLUPacked"
    act_layer: "torch.nn.SiLU"
  notes: >-
    ViT-H/14 + SwiGLU + 4 register tokens (Paige Virchow2). Returns the full
    token sequence [B,261,1280]; embedding = concat(class token, mean of the 256
    patch tokens) = 2560-d, per the card. Loaded without num_classes=0 so the
    tokens are available to the cls_concat_meanpatch pooling.

virchow:
  family: timm
  source: "hf-hub:paige-ai/Virchow"
  recommended_mpp: 0.5   # card states '0.5 microns per pixel (20x)' verbatim - sourced; single-scale
  embedding_dim: 2560        # concat(class_token[1280], mean patch_tokens[1280])
  input_size: 224
  pooling: cls_concat_meanpatch
  reg_tokens: 0             # Virchow v1 has no register tokens (unlike Virchow2)
  transform_source: pretrained_cfg
