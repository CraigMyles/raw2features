keep:
  family: keep
  source: "hf-hub:Astaxanthin/KEEP"
  # The authors publish neither microns-per-pixel nor magnification for the image
  # encoder. Leave scale unspecified rather than inventing a 0.5 µm/px convention.
  embedding_dim: 768
  input_size: 224
  pooling: pooled          # local wrapper returns the projected, L2-normalised vector
  mean: [0.485, 0.456, 0.406]   # official model-card inference transform
  std: [0.229, 0.224, 0.225]
  interpolation: bicubic
  transform_source_url: "https://huggingface.co/Astaxanthin/KEEP/tree/28a25d95cc6ba27a7e6fab3f144e13dbafd8b21e"
  weights_sha256: "82f610d5359aca67b5fd5d841009f26db430ae78d0693743589c0a727b0a146d"   # model.safetensors
