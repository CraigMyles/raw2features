  pooling: cls             # card recommends output[:, 0] -> [B,768]
  reg_tokens: 4            # pinned config: vit_base_patch14_reg4_dinov2
  # The pinned config supplies these model-specific statistics through
  # pretrained_cfg; assert the registry copy against the loaded artifact.
  transform_source: pretrained_cfg
  mean: [0.707223, 0.578729, 0.703617]
  std: [0.211883, 0.230117, 0.177517]
  interpolation: bicubic
  transform_source_url: "https://huggingface.co/bioptimus/H0-mini"
  weights_sha256: "5e4de45a6527a8160f7c21fe3105c987757efe30ce581e1f2cf5809476069ade"
