  notes: >-
    ViT-H/14 + SwiGLU (Paige Virchow v1) -- no register tokens (unlike Virchow2). Returns the
    full token sequence [B,257,1280]; embedding = concat(class token, mean of the 256 patch
    tokens) = 2560-d. Loaded without num_classes=0. Apache-2.0 weights -> embeddings
    unrestricted (unlike virchow2's CC-BY-NC-ND).

gigapath:
  family: timm
  source: "hf-hub:prov-gigapath/prov-gigapath"
  recommended_mpp: 0.5   # paper Methods state 0.5 µm/px / 20x (10.1038/s41586-024-07441-w); card silent; single-scale
  embedding_dim: 1536
  input_size: 224
  pooling: cls            # num_classes=0 -> forward returns the [B,1536] pooled feature
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  interpolation: bicubic
  transform_source_url: "https://huggingface.co/prov-gigapath/prov-gigapath"
  weights_sha256: "877947214318afa9e011754b74bbc3894a1f480a253afc7bc8045b8321dedd63"
