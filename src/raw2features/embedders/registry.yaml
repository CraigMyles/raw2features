  license: "MIT (KEEP, MAGIC-AI4Med)"
  gated: false
  inference_amp: fp32
  notes: >-
    KEEP (Zhou et al., Cancer Cell 2026) -- ViT-L/16 vision-language pathology model;
    raw2features exposes the official 768-d projected, L2-normalised image embedding.
    The pinned upstream wrapper globally monkey-patches timm and is incompatible with
    current timm, so the `keep` family locally reconstructs only its documented visual
    tower + projection head, gives LayerScale the checkpoint's `weight` key without a
    process-wide patch, and strictly loads only visual.* / visual_head.* tensors from the
    SHA-256-verified safetensors artifact. No trust_remote_code and no pickle. ImageNet
    normalisation @ 224 px comes from the pinned model card; no MPP is claimed by the
    authors, so callers should choose --mpp for their protocol.

# ---------------------------------------------------------------------------
# Slide-level encoders
#
# These take (N, patch_dim) patch feature matrices as input and return a
# single (embedding_dim,) slide vector. They are invoked by
# `raw2features slide-embed` and the `-s` flag on `raw2features embed`.
#
# Fields:
#   patch_encoder  - name of the patch model whose features are expected
#   patch_dim      - expected dimension of each patch vector
#
# All other provenance fields follow the same policy as patch encoders:
# preprocessing and load contracts must be sourced from the model card.
# ---------------------------------------------------------------------------

slide_encoders:

  # Pooling baselines (no weights, MIT, always available).
  mean:
    family: pool
    source: builtin
    embedding_dim: -1        # matches patch_dim at runtime
    patch_encoder: any
    patch_dim: -1            # any patch model
    gated: false
    license: MIT
    transform_source_url: "https://github.com/CraigMyles/raw2features"
    notes: "Global mean pool across patches. No weights."

  max:
    family: pool
    source: builtin
    embedding_dim: -1
    patch_encoder: any
    patch_dim: -1
    gated: false
    license: MIT
    transform_source_url: "https://github.com/CraigMyles/raw2features"
    notes: "Global max pool across patches. No weights."

  meanmax:
    family: pool
    source: builtin
    embedding_dim: -1        # 2 x patch_dim at runtime
    patch_encoder: any
    patch_dim: -1
    gated: false
    license: MIT
    transform_source_url: "https://github.com/CraigMyles/raw2features"
    notes: "Concat of mean and max. embedding_dim = 2 x patch_dim."

  # TITAN multimodal slide encoder - builds a feature grid from CONCH v1.5 patch
  # features + level-0 coords (patch_size_lv0). See slide_embedders/titan.py.
  titan:
    family: titan
    source: "hf-hub:MahmoodLab/TITAN"
    embedding_dim: 768
    patch_encoder: conch_v1_5    # TITAN consumes CONCH v1.5 (768-d) features, not UNI
    patch_dim: 768
    gated: true
    license: "CC-BY-NC-ND-4.0 (non-commercial)"
    transform_source_url: "https://huggingface.co/MahmoodLab/TITAN"
    weights_sha256: "4e92128317dca5c9e47d8173467105c21e4095f88d3bde9077e7f1e784b195fe"
    weights_filename: "model.safetensors"
    weights_revision: "dac6773d9961cfc75503440676ff157a2c6e8d2e"
    doi: "10.1038/s41591-025-03982-3"
    notes: >-
      Slide encoder over CONCH v1.5 patch features. Load via AutoModel(TITAN,
      trust_remote_code).encode_slide_from_patch_features(features, coords,
      patch_size_lv0); needs the [models] extra + accepted TITAN gate. Run with
      `-f conch_v1_5 --patch-size 512 -s titan`. Validated full-slide on real cervical WSIs.

  # PRISM (Paige) - Perceiver aggregator over Virchow v1 patch features. No coords needed
  # (unlike TITAN). See slide_embedders/prism.py.
  prism:
    family: prism
    source: "hf-hub:paige-ai/Prism"
    embedding_dim: 1280
    patch_encoder: virchow          # Virchow v1 (2560-d cls_concat_meanpatch); NOT virchow2
    patch_dim: 2560
    gated: true
    license: "CC-BY-NC-ND-4.0 (PRISM, Paige + Microsoft Research; non-commercial)"
    transform_source_url: "https://huggingface.co/paige-ai/Prism"
    weights_revision: "b5ef311e78a0811c71ecf618f6f7140e9ebb5fc6"
    weights_sha256: "01a0f7bcfd1559de31794e08a99e9fe4f9bd758c3b9f1482fe9cb3f5e1e7c5e1"   # model.safetensors
    weights_filename: "model.safetensors"
    doi: "10.48550/arXiv.2405.10254"
    notes: >-
      Slide encoder over Virchow v1 (2560-d) patch features. Load via
      AutoModel("paige-ai/Prism", trust_remote_code).slide_representations(feats)
      ["image_embedding"] -> 1280-d; needs no coords/patch_size_lv0 (unlike TITAN). Needs the
      [prism] extra (environs, sacremoses, imported by its remote code) + accepted
      paige-ai/Prism gate. Run with `-f virchow -s prism`.

  # FEATHER (Mahmood Lab MIL-Lab, ICML 2025) - supervised ABMIL slide aggregators, one
  # per patch encoder. Pure-HF load; slide vector = forward_features pre-head pooling
  # (512-d). See slide_embedders/feather.py.
  feather_conch_v15:
    family: feather
    source: "hf-hub:MahmoodLab/abmil.base.conch_v15.pc108-24k"
    embedding_dim: 512
    patch_encoder: conch_v1_5       # 768-d - already in registry
    patch_dim: 768
    gated: true
    license: "CC-BY-NC-ND-4.0 (FEATHER, Mahmood Lab; non-commercial)"
    transform_source_url: "https://huggingface.co/MahmoodLab/abmil.base.conch_v15.pc108-24k"
    weights_revision: "423c894c738294e8b0ac38938108180a2c21dd43"
    weights_sha256: "08a40daa9e00cca62c65d26f00f7765f5c1b2fe58532806aeda521cb1bc8a708"   # model.safetensors
    weights_filename: "model.safetensors"
    doi: "10.48550/arXiv.2506.09022"
    notes: >-
      FEATHER ABMIL slide encoder over CONCH v1.5 (768-d) patch features -> 512-d slide
      vector. AutoModel(trust_remote_code).forward_features(feats[1,N,768])[0] -> [1,512]
      (no classifier head). Gated - accepted MahmoodLab/abmil.* gate. `-f conch_v1_5 -s
      feather_conch_v15`. The released stand-in for the unreleased THREADS.

  feather_uni_v2:
    family: feather
    source: "hf-hub:MahmoodLab/abmil.base.uni_v2.pc108-24k"
    embedding_dim: 512
    patch_encoder: uni2_h           # 1536-d - already in registry
    patch_dim: 1536
    gated: true
