  weights_revision: "eba85dd46097c3eedfcc2a3a9a930baecb6bcc19"
  doi: "10.1038/s41586-024-07441-w"
  license: "Apache-2.0 (Prov-GigaPath; open, gated only by HF login)"
  gated: true
  inference_amp: fp32      # card gives no precision recommendation -> faithful fp32
  timm_kwargs:
    num_classes: 0
    dynamic_img_size: true
  notes: >-
    Prov-GigaPath tile encoder (ViT-giant/14, Microsoft x Providence), loaded via
    timm.create_model("hf-hub:prov-gigapath/prov-gigapath"). num_classes=0 -> the
    forward returns the pooled 1536-d tile embedding directly (pooling: cls is a
    pass-through for the already-pooled 2-D output). ImageNet norm, 224 px, bicubic
    per the card. Weights are Apache-2.0 (gated only by HF login), so unlike the
    CC-BY-NC-ND models its embeddings are unrestricted.

conch:
  family: conch            # optional family: needs the `conch` pip extra
  source: "hf_hub:MahmoodLab/conch"
  recommended_mpp: 0.5   # scale-agnostic: paper has both 20x encoder-pretraining and 10x MIL; 0.5 is a convention default, not authoritative
  embedding_dim: 512
  input_size: 448          # CONCH operates at 448 px (from its own preprocess), not 224
  pooling: pooled          # encode_image(proj_contrast=False) returns the 512-d vector
  mean: [0.48145466, 0.4578275, 0.40821073]   # OpenAI-CLIP norm, from CONCH's preprocess
  std: [0.26862954, 0.26130258, 0.27577711]
  interpolation: bicubic
  transform_source_url: "https://huggingface.co/MahmoodLab/CONCH"
  weights_sha256: "40a9644b9ba0e83a74576e0a5e5f7313599fa9c9cdaf3c20f8a3e271b0e9ae7c"
  weights_filename: "pytorch_model.bin"
  weights_revision: "f9ca9f877171a28ade80228fb195ac5d79003357"
  doi: "10.1038/s41591-024-02856-4"
  license: "CC-BY-NC-ND-4.0 (CONCH, non-commercial)"
  gated: true
  inference_amp: fp32      # card documents fp16 AMP for TRAINING only -> faithful fp32
  notes: >-
    CONCH image encoder (MahmoodLab, ViT-B/16 @ 448 px). Needs the optional `conch`
    package: pip install "raw2features[conch]". Loaded via
    create_model_from_pretrained("conch_ViT-B-16", "hf_hub:MahmoodLab/conch");
    embedding = encode_image(x, proj_contrast=False, normalize=False) = 512-d (the
    pre-contrastive image features, CONCH's recommended downstream representation).
    CLIP normalisation + 448 px are sourced from CONCH's own preprocess transform and
    asserted at load.

conch_v1_5:
  family: conch_v1_5       # custom CONCH v1.5 tower, bundled in the gated TITAN model
  source: "hf-hub:MahmoodLab/TITAN"   # loaded via AutoModel(TITAN).return_conch()
  recommended_mpp: 0.5   # 20x (TITAN card: '512px @ 20x'; not µm/px - 0.5 by convention); single-scale
  recommended_patch_px: 512   # extract 512 px @ 20x; the shared transform then resizes to the 448 input (per TITAN card)
  embedding_dim: 768
  input_size: 448          # model input; TITAN extracts 512 px @ 20x then resizes to 448
  pooling: pooled          # the tower's forward returns the 768-d feature directly
  mean: [0.485, 0.456, 0.406]   # ImageNet, per CONCH v1.5's eval transform
  std: [0.229, 0.224, 0.225]
  interpolation: bilinear  # CONCH v1.5 uses Resize(448, BILINEAR)
  transform_source_url: "https://huggingface.co/MahmoodLab/conch_v1_5"
  weights_sha256: "09daf1912a016512e084636f9c76eee7c42f5c1f09b0461bb76082a3e0fecfa5"
  weights_filename: "conch_v1_5_pytorch_model.bin"
  weights_revision: "dac6773d9961cfc75503440676ff157a2c6e8d2e"
  doi: "10.1038/s41591-025-03982-3"   # introduced with TITAN (Ding et al., Nat Med 2025)
  license: "CC-BY-NC-ND-4.0 (CONCH v1.5, non-commercial)"
  gated: true
  inference_amp: fp16      # the card runs CONCH v1.5 under fp16 autocast
  notes: >-
    CONCH v1.5 tile encoder (MahmoodLab) - the 768-d patch encoder TITAN consumes.
    Loaded via AutoModel("MahmoodLab/TITAN", trust_remote_code=True).return_conch(), so
    it needs the [models] extra + an accepted TITAN gate. Extract at 512 px @ 20x
    (--patch-size 512); the shared transform resizes to 448 + ImageNet norm, matching its
    eval transform, and the store's level0_patch then equals TITAN's patch_size_lv0.
    Pair with `-s titan` for slide embeddings. Validated full-slide on real WSIs.

