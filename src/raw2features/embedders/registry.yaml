    mlp_ratio: 5.33334
    global_pool: ""
    dynamic_img_size: true
    mlp_layer: "timm.layers.SwiGLUPacked"
    act_layer: "torch.nn.SiLU"
  notes: >-
    Bioptimus/Owkin H0-mini, an 86M-parameter ViT-B/14 distilled from H-optimus-0.
    The card's forward returns [B,261,768] (CLS + 4 registers + 256 patch tokens) and
    recommends the 768-d CLS token for downstream tasks. The optional 1536-d
    CLS+mean-patch representation is deliberately not used. Gated, non-commercial.

h_optimus_1:
