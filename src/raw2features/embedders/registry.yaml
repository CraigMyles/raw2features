  doi: "10.1038/s41586-024-08378-w"
  license: "CC-BY-NC-ND-4.0 (MUSK, Stanford/Harvard; non-commercial, no-derivatives)"
  gated: true
  inference_amp: fp16
  notes: >-
    MUSK (Xiang et al., Nature 2024) -- BEiT3 vision-language model; we use the image tower
    (musk_large_patch16_384) -> 1024-d. Loaded via the `musk` package ([musk] extra; deferred
    import) on top of timm; forward model(image, with_head=False, out_norm=True, ms_aug=False).
    Inception [0.5] norm @ 384 px -> run with --patch-size 384. CC-BY-NC-ND weights, gated.

