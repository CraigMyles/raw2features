# --- Multiplex (spatial proteomics) - a SECOND modality, not H&E ----------
kronos:
  family: kronos           # optional family: needs the `kronos` pip extra
  modality: multiplex      # CODEX / Phenocycler marker stacks - not brightfield H&E
  source: "hf_hub:MahmoodLab/kronos"
  embedding_dim: 384       # KRONOSv1 ViT-S/16 patch embedding
  input_size: 224
  pooling: pooled          # the model returns the patch embedding directly
  # Per-marker normalisation is resolved at runtime from the model's published
  # marker_metadata.csv (marker name -> id + mean/std); the RGB-style mean/std below
  # are unused for multiplex (kept only to satisfy the shared ModelSpec contract).
  mean: [0.0, 0.0, 0.0]
  std: [1.0, 1.0, 1.0]
  interpolation: bicubic
  transform_source_url: "https://huggingface.co/MahmoodLab/kronos"
  weights_sha256: "a0bc5cced0543ebf2f66634510991992fc689431a1d3b53ee61133d8824a7aaa"
  weights_filename: "kronos_vits16_model.pt"
  weights_revision: "8edc2719ad67b2e2b766073b35c6cf8e6f5da516"
  doi: "10.48550/arXiv.2506.03373"
  license: "CC-BY-NC-ND-4.0 (KRONOS, non-commercial)"
  gated: true
  notes: >-
    KRONOSv1 (MahmoodLab) - a panel-agnostic MULTIPLEX (spatial-proteomics) encoder,
    not H&E. Needs the optional `kronos` package: pip install "raw2features[kronos]".
    Consumes a marker stack [B,M,224,224]: each channel is standardised by its marker's
    mean/std and tagged with a marker id (sinusoidal marker-identity embedding), both
    resolved from the public v1 marker_metadata.csv; markers outside its 175-marker vocab
    (blanks/empties/unknown) are dropped. ViT-S/16 -> 384-d patch embedding. The reader
    surfaces channel_names; the embedder's set_panel() binds them per slide. Uses torch
    SDPA (flash attention) by default -- no xFormers; much faster and far lighter on memory than KRONOS's
    upstream naive-attention fallback, so the default batch fits. Opt out with `sdpa: false`. Validated full-slide on real CODEX multiplex data.

musk:
  family: musk
  source: "hf-hub:xiangjx/musk"
  recommended_mpp: 0.5   # CONVENTION (unsourced): no card/repo/paper MPP; heterogeneous vision-language corpus - a default
  embedding_dim: 1024
  input_size: 384
  pooling: cls               # the musk family forward returns the 1024-d vision feature directly
  mean: [0.5, 0.5, 0.5]      # inception-style norm (MUSK README), 384px
  std: [0.5, 0.5, 0.5]
  interpolation: bicubic
  transform_source_url: "https://github.com/lilab-stanford/MUSK/blob/main/README.md"
  weights_sha256: "83d9f2429ec3f04fc3bdc4bc6d8e6c78035ea196fdce9fe05d76ea0e8cad0375"
  weights_filename: "model.safetensors"
