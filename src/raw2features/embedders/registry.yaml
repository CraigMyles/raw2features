gpfm:
  family: timm
  source: "vit_large_patch14_dinov2.lvd142m"   # base arch; weights from checkpoint below
  recommended_mpp: 0.5   # no single training mpp: pretrained on 512px @ native level-0 (varied mag; card recommends 40x), resized to 224. 40x=0.25 native; 0.5 = 20x-equiv convention (FOV-faithful ~0.57). NOT card-stated
