  # LICENCE CONFLICT (verified from primary sources 2026-06): the HF card metadata
  # (majiabo/GPFM) declares `license: mit`, but the authors' source repo
  # (github.com/birkhoffkiki/GPFM) ships a LICENSE file that is verbatim CC-BY-NC-ND-4.0.
  # The two disagree; we record both and leave the call to the user. See docs/MODELS.md
  # footnote 7 + docs/MODEL_LICENSES.md.
  license: "MIT (HF metadata) / CC-BY-NC-ND-4.0 (repo LICENSE) - CONFLICT, verify"
  gated: false
  inference_amp: fp32      # DINOv2 ViT-L; card gives no precision rec -> faithful fp32
  timm_kwargs:
